name: CI

# Runs on every push to main and on every pull-request update. (A push to a
# branch with an open PR triggers the pull_request event, so feature branches
# are covered without double-running.)
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: subject audit + style (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # The build submodules are public but their .gitmodules URLs are SSH;
      # rewrite to HTTPS so CI can fetch them without a deploy key. Only the
      # two the build needs are initialised (skip the unrelated ircd repo).
      - name: fetch build submodules (public, over HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init vendor/libcpp vendor/googletest
      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential python3 clang-format
      - name: audit — builds mandatory + bonus + full, subject checks
        run: bash scripts/audit.sh
      - name: style — whitespace gate (clang-format advisory)
        run: bash scripts/normalize.sh --check

  docker:
    name: docker images + in-container tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: fetch build submodules (public, over HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init vendor/libcpp vendor/googletest
      # `--target test` compiles the full tier and runs the 138-assertion
      # Google Test suite inside the image; a test failure fails the build.
      - name: server image — run the test suite in-container
        run: docker build --target test -t ircserv-test .
      - name: server runtime image
        run: docker build -t ircserv .
      - name: ai-assistant image (cargo --locked)
        run: docker build -t ai-assistant companions/ai-assistant
      - name: validate compose config
        env:
          ANTHROPIC_API_KEY: dummy
        run: docker compose config >/dev/null
