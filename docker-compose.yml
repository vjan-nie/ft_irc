# ─────────────────────────────────────────────────────────────────────────────
#  Full ft_irc stack: the C++98 server + the Claude-backed Rust companion,
#  plus an optional real-time/web tier behind the "platform" profile.
#
#    cp .env.example .env                       # set ANTHROPIC_API_KEY
#    docker compose up --build                  # ircserv + ai-assistant
#    docker compose --profile platform up --build   # + realtime-agnostic + bridge
#
#  Companions connect to the server over the compose network (host "ircserv")
#  as ordinary IRC clients; the server itself is subject-clean and unaware of
#  them. The "platform" tier adds realtime-agnostic (WebSocket pub/sub on :4000)
#  and a bridge that mirrors IRC ↔ realtime in both directions.
# ─────────────────────────────────────────────────────────────────────────────

services:
  ircserv:
    build:
      context: .
      dockerfile: Dockerfile
    image: ft_irc/ircserv
    command: ["6667", "${IRC_SERVER_PASSWORD:-changeme}"]
    ports:
      - "${IRC_PORT:-6667}:6667"
    restart: unless-stopped

  ai-assistant:
    build:
      context: ./companions/ai-assistant
    image: ft_irc/ai-assistant
    depends_on:
      - ircserv
    environment:
      IRC_HOST: ircserv
      IRC_PORT: "6667"
      IRC_PASS: "${IRC_SERVER_PASSWORD:-changeme}"
      IRC_NICK: "${IRC_NICK:-assistant}"
      IRC_CHANNELS: "${IRC_CHANNELS:-#general}"
      # Required — set in .env. The ${VAR:?msg} form fails fast if unset.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-opus-4-8}"
    # The companion has its own 3s reconnect loop, so it tolerates the server
    # not being ready the instant it starts.
    restart: unless-stopped

  # ── Optional real-time / web tier (docker compose --profile platform up) ──
  realtime:
    image: dlesieur/realtime-agnostic:latest
    profiles: ["platform"]
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    # No healthcheck: the realtime image is distroless (no curl/sh to probe
    # with). The bridge below has its own 3s reconnect loop, which is the real
    # readiness gate.
    restart: unless-stopped

  realtime-bridge:
    build:
      context: ./companions/realtime-bridge
    image: ft_irc/realtime-bridge
    profiles: ["platform"]
    depends_on:
      ircserv:
        condition: service_started
      realtime:
        condition: service_started
    environment:
      IRC_HOST: ircserv
      IRC_PORT: "6667"
      IRC_PASS: "${IRC_SERVER_PASSWORD:-changeme}"
      IRC_NICK: "${RT_BRIDGE_NICK:-rtbridge}"
      IRC_CHANNELS: "${IRC_CHANNELS:-#general}"
      RT_PUBLISH_URL: "http://realtime:4000/v1/publish"
      RT_WS_URL: "ws://realtime:4000/ws"
      RT_INBOUND_TOPICS: "${RT_INBOUND_TOPICS:-pg/**,mongo/**,irc-in/**}"
      RT_DEFAULT_CHANNEL: "${RT_DEFAULT_CHANNEL:-#general}"
      RT_PUPPETS: "${RT_PUPPETS:-true}"
      RT_PUPPET_MAX: "${RT_PUPPET_MAX:-50}"
      RT_PUPPET_TTL_SECS: "${RT_PUPPET_TTL_SECS:-120}"
    restart: unless-stopped
